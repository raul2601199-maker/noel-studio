<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #000;
    font-family: 'Outfit', sans-serif;
    overflow: hidden;
  }
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@200;300;400;600&display=swap');
</style>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@200;300;400;600&display=swap" rel="stylesheet">
</head>
<body>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=Outfit:wght@200;300;400;600&amp;display=swap');
    </style>
  </defs>

  <!-- Fondo negro -->
  <rect width="1200" height="630" fill="#000000"/>

  <!-- Grid lines decorativas -->
  <line x1="0" y1="1" x2="1200" y2="1" stroke="#111" stroke-width="1"/>
  <line x1="0" y1="629" x2="1200" y2="629" stroke="#111" stroke-width="1"/>
  <line x1="80" y1="0" x2="80" y2="630" stroke="#111" stroke-width="1"/>
  <line x1="1120" y1="0" x2="1120" y2="630" stroke="#111" stroke-width="1"/>

  <!-- Línea superior decorativa -->
  <line x1="80" y1="80" x2="520" y2="80" stroke="#333" stroke-width="1"/>
  <line x1="680" y1="80" x2="1120" y2="80" stroke="#333" stroke-width="1"/>

  <!-- Línea inferior decorativa -->
  <line x1="80" y1="550" x2="520" y2="550" stroke="#333" stroke-width="1"/>
  <line x1="680" y1="550" x2="1120" y2="550" stroke="#333" stroke-width="1"/>

  <!-- Punto esquinas -->
  <circle cx="80" cy="80" r="4" fill="#fff"/>
  <circle cx="1120" cy="80" r="4" fill="#fff"/>
  <circle cx="80" cy="550" r="4" fill="#fff"/>
  <circle cx="1120" cy="550" r="4" fill="#fff"/>

  <!-- Monograma NS izquierda -->
  <!-- Marco -->
  <rect x="80" y="240" width="160" height="150" fill="none" stroke="#222" stroke-width="1.5"/>
  <circle cx="240" cy="240" r="3" fill="#fff"/>
  <circle cx="80" cy="390" r="3" fill="#fff"/>
  <!-- N -->
  <line x1="102" y1="360" x2="102" y2="270" stroke="#fff" stroke-width="7" stroke-linecap="square"/>
  <line x1="102" y1="270" x2="142" y2="360" stroke="#fff" stroke-width="7" stroke-linecap="square"/>
  <line x1="142" y1="270" x2="142" y2="360" stroke="#fff" stroke-width="7" stroke-linecap="square"/>
  <!-- Separador -->
  <line x1="153" y1="270" x2="153" y2="360" stroke="#333" stroke-width="1"/>
  <!-- S -->
  <path d="M 163 300 Q 163 270 183 270 L 218 270 Q 238 270 238 288 Q 238 308 210 315 Q 163 325 163 345 Q 163 360 183 360 L 218 360 Q 238 360 238 345"
        fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round"/>

  <!-- Separador vertical central -->
  <line x1="290" y1="120" x2="290" y2="510" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Título principal -->
  <text x="340" y="230"
        font-family="'Bebas Neue', 'Arial Black', sans-serif"
        font-size="120"
        fill="#ffffff"
        letter-spacing="8">NOEL</text>

  <text x="343" y="320"
        font-family="'Bebas Neue', 'Arial Black', sans-serif"
        font-size="120"
        fill="#ffffff"
        letter-spacing="8">STUDIO</text>

  <!-- Subtítulo -->
  <text x="345" y="375"
        font-family="'Outfit', Arial, sans-serif"
        font-size="18"
        fill="#555555"
        letter-spacing="6"
        font-weight="300">DISEÑO WEB PROFESIONAL · CHIHUAHUA</text>

  <!-- Línea divisoria -->
  <line x1="345" y1="400" x2="1120" y2="400" stroke="#222" stroke-width="1"/>

  <!-- Info abajo -->
  <text x="345" y="445"
        font-family="'Outfit', Arial, sans-serif"
        font-size="22"
        fill="#888888"
        letter-spacing="2"
        font-weight="300">Páginas web modernas para negocios locales</text>

  <!-- Precio -->
  <text x="345" y="495"
        font-family="'Bebas Neue', Arial, sans-serif"
        font-size="36"
        fill="#ffffff"
        letter-spacing="4">DESDE $7,000 MXN</text>

  <!-- Website y teléfono -->
  <text x="345" y="535"
        font-family="'Outfit', Arial, sans-serif"
        font-size="16"
        fill="#444444"
        letter-spacing="3"
        font-weight="300">noelstudio.netlify.app</text>

  <text x="900" y="535"
        font-family="'Outfit', Arial, sans-serif"
        font-size="16"
        fill="#444444"
        letter-spacing="3"
        font-weight="300">614 225 1419</text>

  <!-- Etiqueta esquina -->
  <text x="600" y="97"
        font-family="'Outfit', Arial, sans-serif"
        font-size="11"
        fill="#333333"
        letter-spacing="4"
        text-anchor="middle"
        font-weight="300">CHIHUAHUA · MÉXICO</text>

</svg>
</body>
</html>
